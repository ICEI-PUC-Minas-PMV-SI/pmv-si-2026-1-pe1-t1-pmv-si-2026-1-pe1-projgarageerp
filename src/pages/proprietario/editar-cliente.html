<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/pages/proprietario/editar-cliente.css">
    <title>Cadastro de clientes</title>
</head>

     <body>
        <main class="container">

                <a href="lista-clientes.html" class="link-voltar">
                <i class="fas fa-arrow-left"></i> Voltar para Clientes
                </a>

            <form class="card-edicao">
                <h1>Editar Cliente</h1>
                <p class="subtitulo">Atualize as informações do cliente</p>

                <div class="alerta-info">
                    <i class="fas fa-user"></i>
                    <span>Preencha os dados do cliente. Todos os campos são obrigatórios.</span>
                </div>

                <div class="input-box">
                    <label class="nome">Nome Completo *</label>
                    <input placeholder="Maria Santos" type="text">
                    <p class="ajuda">Nome que aparecerá nos registros</p>
                </div>

                <div class="input-box">
                    <label class="nome">Telefone *</label>
                    <input placeholder="(11) 97654-3210" type="tel">
                    <p class="ajuda">Telefone para contato</p>
                </div>

                <div class="input-box">
                    <label class="nome">Email *</label>
                    <input placeholder="maria@email.com" type="email">
                    <p class="ajuda">Email para notificações</p>
                </div>

                <div class="acoes-form">
                    <button type="button" class="btn-cancelar">Cancelar</button>
                    <button type="submit" class="btn-atualizar">
                        <i class="far fa-save"></i> Atualizar Cliente
                    </button>  
                </div>

            </form>

        </main>
    
    </body>

</html>
